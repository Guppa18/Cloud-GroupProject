<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Ticket Booking System</title>

    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet"> 
    
    <style>
        /* --- MAIN BACKGROUND --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: white;
            background-image: url('f1.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Dark overlay to make text pop against the image */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1;
        }

        header {
            background-color: rgba(208, 0, 0, 0.9); /* F1 Red */
            text-align: center;
            padding: 30px 20px;
            border-bottom: 5px solid #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        header h1 {
            font-family: 'Russo One', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Glassmorphism Effect for Sections */
        .section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            font-family: 'Russo One', sans-serif;
            border-left: 5px solid #d00000;
            padding-left: 15px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-sizing: border-box; /* Fixes width issues */
        }

        button {
            background-color: #d00000;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 5px;
            font-family: 'Russo One', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #f00000;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background-color: #d00000;
            color: white;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            font-size: 0.9em;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>F1 TICKET BOOKING SYSTEM</h1>
    </header>

    <div class="container">
        
        <div class="section">
            <h2>Reserve Your Seat</h2>
            <form id="bookingForm">
                <label>Full Name:</label>
                <input type="text" id="customerName" placeholder="Enter your full name" required>

                <label>Email Address:</label>
                <input type="email" id="email" placeholder="example@f1.com" required>

                <label>Select Grand Prix:</label>
                <select id="race">
                    <option value="" disabled selected>Choose a race...</option>
                    <option value="Australian Grand Prix">Australian Grand Prix (Albert Park)</option>
                    <option value="Monaco Grand Prix">Monaco Grand Prix (Monte Carlo)</option>
                    <option value="British Grand Prix">British Grand Prix (Silverstone)</option>
                    <option value="Las Vegas Grand Prix">Las Vegas Grand Prix (Nevada)</option>
                    <option value="Abu Dhabi Grand Prix">Abu Dhabi Grand Prix (Yas Marina)</option>
                </select>

                <label>Ticket Tier:</label>
                <select id="ticketTier">
                    <option value="" disabled selected>Select ticket tier...</option>
                    <option value="General Admission">General Admission</option>
                    <option value="Grandstand">Grandstand</option>
                    <option value="VIP">VIP</option>
                    <option value="Paddock Club">Paddock Club</option>
                </select>

                <button type="button" id="submitBtn" onclick="addBooking()">CONFIRM BOOKING</button>
            </form>
        </div>

        <div class="section">
            <h2>Confirmed Bookings</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Grand Prix</th>
                        <th>Tier</th>
                    </tr>
                </thead>
                <tbody id="bookingTableBody">
                    </tbody>
            </table>
        </div>

    </div>

    <footer>
        <p>Support: F1ticketbooking@ticket.org | Helpline: +61 467-346-XXX</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
