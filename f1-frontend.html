<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Ticket Booking System</title>

    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet"> 
    
    <style>
        /* --- MAIN BACKGROUND --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: white;
            background-image: url('f1.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Dark overlay to make text pop against the image */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1;
        }

        header {
            background-color: rgba(208, 0, 0, 0.9); /* F1 Red */
            text-align: center;
            padding: 30px 20px;
            border-bottom: 5px solid #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        header h1 {
            font-family: 'Russo One', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        /* --- ROLEX THEMED TIMER STYLING --- */
        .rolex-section {
            background: linear-gradient(145deg, #004d2e, #002516); /* Rolex Deep Green */
            border-bottom: 2px solid #A37E2C; /* Rolex Gold bottom edge */
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(163, 126, 44, 0.15);
            padding: 15px 20px 20px 20px; 
            margin: 0; 
            width: 100%;
            box-sizing: border-box;
            display: block;
        }

        .rolex-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px; 
            flex-wrap: wrap; 
        }

        .rolex-watch-img {
            max-height: 180px; 
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.6)); 
        }

        .rolex-text-container {
            text-align: center;
        }

        .rolex-title {
            color: #A37E2C;
            font-family: 'Times New Roman', Times, serif; 
            letter-spacing: 5px;
            margin: 0 0 2px 0;
            font-size: 1.1em;
            border-left: none; /* Removes the red line */
            padding-left: 0;
        }

        .rolex-subtitle {
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            font-size: 0.75em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px; 
            opacity: 0.8;
        }

        .timer-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #A37E2C;
            border-radius: 5px;
            padding: 8px 15px; 
            min-width: 60px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            text-align: center;
        }

        .time-box span {
            display: block;
            font-size: 2em; 
            font-weight: bold;
            font-family: Arial, sans-serif;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .time-box p {
            margin: 5px 0 0 0;
            color: #A37E2C;
            font-size: 0.7em;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* --- CONTAINER & SECTIONS --- */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            font-family: 'Russo One', sans-serif;
            border-left: 5px solid #d00000;
            padding-left: 15px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-sizing: border-box; 
        }

        button {
            background-color: #d00000;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 5px;
            font-family: 'Russo One', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #f00000;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background-color: #d00000;
            color: white;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            font-size: 0.9em;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>F1 TICKET BOOKING SYSTEM</h1>
    </header>

    <div class="rolex-section">
        <div class="rolex-content">
            
            <div class="rolex-text-container">
                <h2 class="rolex-title">COUNTDOWN TO THE 2026 FINAL RACE</h2>
                <p class="rolex-subtitle">Experience the Thrill of F1 Racing - Book Your Tickets Now!</p>

                
                <div class="timer-container" id="rolexTimer">
                    <div class="time-box">
                        <span id="days">00</span>
                        <p>DAYS</p>
                    </div>
                    <div class="time-box">
                        <span id="hours">00</span>
                        <p>HRS</p>
                    </div>
                    <div class="time-box">
                        <span id="minutes">00</span>
                        <p>MIN</p>
                    </div>
                    <div class="time-box">
                        <span id="seconds">00</span>
                        <p>SEC</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        
        <div class="section">
            <h2>Reserve Your Seat</h2>
            <form id="bookingForm">
                <label>Full Name:</label>
                <input type="text" id="customerName" placeholder="Enter your full name" required>

                <label>Email Address:</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>

                <label>Select Grand Prix:</label>
                <select id="race">
                    <option value="" disabled selected>Choose a race...</option>
                    <option value="Australian Grand Prix">Australian Grand Prix (Melbourne)</option>
                    <option value="Chinese Grand Prix">Chinese Grand Prix (Shanghai)</option>
                    <option value="Japanese Grand Prix">Japanese Grand Prix (Suzuka)</option>
                    <option value="Bahrain Grand Prix">Bahrain Grand Prix (Sakhir)</option>
                    <option value="Saudi Arabian Grand Prix">Saudi Arabian Grand Prix (Jeddah)</option>
                    <option value="Miami Grand Prix">Miami Grand Prix (Miami)</option>
                    <option value="Canadian Grand Prix">Canadian Grand Prix (Montreal)</option>
                    <option value="Monaco Grand Prix">Monaco Grand Prix (Monte Carlo)</option>
                    <option value="Barcelona-Catalunya Grand Prix">Barcelona-Catalunya Grand Prix (Barcelona)</option>
                    <option value="Austrian Grand Prix">Austrian Grand Prix (Spielberg)</option>
                    <option value="British Grand Prix">British Grand Prix (Silverstone)</option>
                    <option value="Belgian Grand Prix">Belgian Grand Prix (Spa-Francorchamps)</option>
                    <option value="Hungarian Grand Prix">Hungarian Grand Prix (Budapest)</option>
                    <option value="Dutch Grand Prix">Dutch Grand Prix (Zandvoort)</option>
                    <option value="Italian Grand Prix">Italian Grand Prix (Monza)</option>
                    <option value="Madrid Grand Prix">Spanish Grand Prix (Madrid)</option>
                    <option value="Azerbaijan Grand Prix">Azerbaijan Grand Prix (Baku)</option>
                    <option value="Singapore Grand Prix">Singapore Grand Prix (Marina Bay)</option>
                    <option value="United States Grand Prix">United States Grand Prix (Austin)</option>
                    <option value="Mexico City Grand Prix">Mexico City Grand Prix (Mexico City)</option>
                    <option value="São Paulo Grand Prix">São Paulo Grand Prix (Interlagos)</option>
                    <option value="Las Vegas Grand Prix">Las Vegas Grand Prix (Las Vegas)</option>
                    <option value="Qatar Grand Prix">Qatar Grand Prix (Lusail)</option>
                    <option value="Abu Dhabi Grand Prix">Abu Dhabi Grand Prix (Yas Marina)</option>
                </select>

                <label>Ticket Tier:</label>
                <select id="ticketTier">
                    <option value="" disabled selected>Select ticket tier...</option>
                    <option value="General Admission">General Admission</option>
                    <option value="Grandstand">Grandstand</option>
                    <option value="VIP">VIP</option>
                    <option value="Paddock Club">Paddock Club</option>
                </select>

                <button type="button" id="submitBtn" onclick="addBooking()">CONFIRM BOOKING</button>
            </form>
        </div>

        <div class="section">
            <h2>Confirmed Bookings</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Grand Prix</th>
                        <th>Tier</th>
                    </tr>
                </thead>
                <tbody id="bookingTableBody">
                </tbody>
            </table>
        </div>

    </div>

    <footer>
        <p>Support: F1ticketbooking@ticket.org | Helpline: +61 467-346-XXX</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
